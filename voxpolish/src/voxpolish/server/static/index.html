<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VoxPolish</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>VoxPolish</h1>
  <div class="transport">
    <button id="play">Play</button>
    <select id="source">
      <option value="cleaned">Cleaned</option>
      <option value="original">Original</option>
    </select>
    <span id="time">0:00</span>
  </div>
  <div class="zoom">
    <button id="zoom-out" title="Zoom out">−</button>
    <button id="zoom-fit" title="Fit whole file">Fit</button>
    <button id="zoom-in" title="Zoom in">+</button>
  </div>
  <div class="actions">
    <span id="status" class="status"></span>
    <button id="render" class="primary">Render</button>
  </div>
</header>

<main>
  <aside id="rail">
    <div class="module">
      <label><input type="checkbox" id="on-dynamics" checked>
        <span class="dot dyn"></span>Dynamics</label>
      <input type="range" id="amt-dynamics" min="0" max="150" value="100">
      <span class="val" id="amtv-dynamics">100%</span>
    </div>
    <div class="module">
      <label><input type="checkbox" id="on-gate" checked>
        <span class="dot gate"></span>Gate</label>
      <span class="count" id="count-pauses"></span>
    </div>
    <div class="module">
      <label><input type="checkbox" id="on-breath" checked>
        <span class="dot breath"></span>Breath</label>
      <input type="range" id="amt-breath" min="0" max="150" value="100">
      <span class="val" id="amtv-breath">100%</span>
      <span class="count" id="count-breaths"></span>
    </div>
    <div class="module">
      <label><input type="checkbox" id="on-sibilance" checked>
        <span class="dot sib"></span>Sibilance</label>
      <input type="range" id="amt-sibilance" min="0" max="150" value="100">
      <span class="val" id="amtv-sibilance">100%</span>
      <span class="count" id="count-sibilants"></span>
    </div>
    <p class="hint">Toggle a module off, or slide its amount, then
      <b>Render</b>. Click a colored region and press <kbd>Delete</kbd> to
      remove it. Scroll to pan, <kbd>Ctrl</kbd>+scroll to zoom.</p>
  </aside>

  <section id="editor">
    <canvas id="wave"></canvas>
    <div id="inspector" class="hidden">
      <span id="inspector-text"></span>
      <button id="delete-region">Delete region</button>
    </div>
  </section>
</main>

<audio id="audio"></audio>
<script src="/static/app.js"></script>
</body>
</html>
